name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Add vendor/bin to PATH
        run: echo "$(pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Run PHP linting (phpcbf + phpcs + phpstan)
        run: pnpm run lint:php

  lint-ts:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript ESLint
        run: pnpm run lint:ts

      - name: Check for uncommitted changes after lint
        run: |
          if ! git diff --exit-code; then
            echo "::error::lint:ts produced auto-fixes that were not committed. Please run 'pnpm run lint:ts' locally and commit the changes."
            git diff
            exit 1
          fi

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prettier-ESLint format
        run: pnpm run format

      - name: Check for uncommitted changes after format
        run: |
          if ! git diff --exit-code; then
            echo "::error::Format check failed. Please run 'pnpm run format' locally and commit the changes."
            git diff
            exit 1
          fi

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: tests/e2e
        run: npx playwright install-deps chromium

      - name: Cache wp-env
        uses: actions/cache@v4
        with:
          path: ~/.wp-env
          key: wp-env-${{ runner.os }}-${{ hashFiles('.wp-env.json') }}

      - name: Start WordPress environment
        run: ./tests/e2e/node_modules/.bin/wp-env start
        timeout-minutes: 10

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

      - name: Restore plugin.php (safety)
        if: always()
        run: |
          if [ -f plugin.php.e2e-backup ]; then
            cp plugin.php.e2e-backup plugin.php
            echo "plugin.php restored from backup"
          fi

      - name: Stop WordPress environment
        if: always()
        run: ./tests/e2e/node_modules/.bin/wp-env stop || true
