# Power Shop — GitHub Release 時自動打包並附加 ZIP 資產
#
# 觸發：手動建立 Release（published），或 workflow_dispatch 指定 tag
# 流程：checkout → 安裝依賴 → 建置前端 → 產生排除 dev 檔案的 plugin zip → 附加到 release
#
# 注意：不跑 release-it（需 local .env），僅在已建立的 Release 上補 ZIP 資產

name: Release Plugin ZIP

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 目標 release tag（例：v3.0.21）
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-attach:
    name: Build & attach plugin zip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLUGIN_SLUG: power-shop
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 1

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安裝 Node 依賴
        run: pnpm install --frozen-lockfile

      - name: 設定 PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: 安裝 Composer 依賴（production only）
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: 建置前端（production）
        run: pnpm run build

      - name: 打包 Plugin ZIP（排除開發檔案）
        id: pack
        run: |
          set -euo pipefail
          ZIP_NAME="${PLUGIN_SLUG}-${TAG_NAME}.zip"
          WORK_DIR="$(pwd)"
          STAGE_DIR="$(mktemp -d)/${PLUGIN_SLUG}"
          mkdir -p "${STAGE_DIR}"

          # 使用 rsync 將 plugin 內容複製至 staging，排除不該打包的檔案
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='.cursor' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='specs' \
            --exclude='release' \
            --exclude='js/src' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.eslintrc*' \
            --exclude='.prettierrc*' \
            --exclude='tsconfig*.json' \
            --exclude='vite.config.*' \
            --exclude='phpcs.xml' \
            --exclude='phpstan.neon' \
            --exclude='package.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='*.log' \
            --exclude='*.md' \
            --exclude='.env*' \
            "${WORK_DIR}/" "${STAGE_DIR}/"

          (cd "$(dirname "${STAGE_DIR}")" && zip -rq "${WORK_DIR}/${ZIP_NAME}" "${PLUGIN_SLUG}")
          ls -lh "${ZIP_NAME}"
          echo "zip_path=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: 上傳 ZIP 為 artifact（給 workflow_dispatch 也能下載）
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ env.TAG_NAME }}
          path: ${{ steps.pack.outputs.zip_path }}
          retention-days: 30

      - name: 附加 ZIP 到 GitHub Release（僅 release 事件）
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG_NAME}" "${{ steps.pack.outputs.zip_path }}" --clobber
          echo "✅ 已附加 ${{ steps.pack.outputs.zip_path }} 到 Release ${TAG_NAME}"
