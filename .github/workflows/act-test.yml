# 本地 act 測試用 — 驗證多 job 結構（job 依賴鏈 + artifact 傳遞 + build）
# Windows 用法（需先建立 artifact 目錄）:
#   mkdir -p "$env:TEMP/act-artifacts"
#   act workflow_dispatch -W .github/workflows/act-test.yml \
#     --container-architecture linux/amd64 \
#     -P ubuntu-latest=catthehacker/ubuntu:act-latest \
#     --container-options "--privileged" \
#     --artifact-server-path "C:/Users/$env:USERNAME/AppData/Local/Temp/act-artifacts"
#
# ⚠️ 此檔案不應 commit，僅供本地測試
# NOTE: act on Windows 的 artifact server v4 有 bug，artifact 下載會失敗但不影響結構驗證
#
# 測試範圍（刻意 mock 掉 wp-env 和 Claude Code，只驗結構）：
#   integration-tests job：安裝依賴 + build + 上傳 auth artifact
#   ai-acceptance job：LC bypass + auth artifact 預檢 + 下載 + 驗證

name: Act Test (Multi-Job Structure Validation)

on:
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WP_CLI_ALLOW_ROOT: 1
    outputs:
      phpunit_ok: ${{ steps.mock_phpunit.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4

      - name: 安裝 Node 依賴
        run: pnpm install

      - name: 安裝 PHP + Composer（act image 未預裝）
        run: |
          apt-get update -qq && apt-get install -y -qq php-cli php-xml php-mbstring php-curl unzip > /dev/null 2>&1
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: 安裝 Composer 依賴
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      - name: 建置前端（驗證 TypeScript 編譯正常）
        run: pnpm run build

      - name: Mock PHPUnit 結果（act 環境跳過 wp-env）
        id: mock_phpunit
        run: |
          echo "✅ [Mock] PHPUnit 已略過（act 環境不啟動 wp-env）"
          echo "status=passed" >> $GITHUB_OUTPUT

      - name: 建立模擬 auth state（供 ai-acceptance job 使用）
        run: |
          mkdir -p tests/e2e/.auth
          echo '{"cookies":[{"name":"wordpress_logged_in","value":"mock_token","domain":"localhost"}],"origins":[]}' > tests/e2e/.auth/admin.json
          echo "✅ 模擬 auth state 建立完成"
          cat tests/e2e/.auth/admin.json

      - name: 上傳 auth-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/.auth/
          retention-days: 1

      - name: 確認 integration-tests job 完成
        run: |
          echo "✅ integration-tests job 完成"
          echo "  - 前端 build: ✅"
          echo "  - auth artifact 已上傳: ✅"
          echo "  - outputs.phpunit_ok: ${{ steps.mock_phpunit.outcome }}"

  ai-acceptance:
    name: AI 驗收
    needs: integration-tests
    if: needs.integration-tests.outputs.phpunit_ok == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4

      - name: 安裝 Node 依賴
        run: pnpm install

      - name: 安裝 PHP + Composer（act image 未預裝）
        run: |
          apt-get update -qq && apt-get install -y -qq php-cli php-xml php-mbstring php-curl unzip > /dev/null 2>&1
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: 安裝 Composer 依賴（主機端）
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      # ── 新步驟：LC Bypass 驗證 ────────────────────────
      - name: 套用 LC Bypass（跳過外掛授權驗證）
        run: |
          node -e "
            const fs = require('fs');
            const CAPABILITY_LINE = \"'capability'  => 'manage_woocommerce',\";
            const LC_LINE = \"\t\t\t\t\t'lc'          => false,\";
            const content = fs.readFileSync('plugin.php', 'utf-8');
            if (!content.includes(\"'lc'\")) {
              const modified = content.replace(CAPABILITY_LINE, CAPABILITY_LINE + '\n' + LC_LINE);
              if (modified !== content) {
                fs.writeFileSync('plugin.php', modified);
                console.log('✅ LC bypass applied to plugin.php');
              } else {
                console.warn('⚠️ capability line not found in plugin.php, skipping LC bypass');
              }
            } else {
              console.log('ℹ️ LC bypass already applied');
            }
            const p = JSON.parse(fs.readFileSync('.e2e-progress.json', 'utf-8'));
            p.lc_bypass_applied = true;
            fs.writeFileSync('.e2e-progress.json', JSON.stringify(p, null, '\t'));
            console.log('✅ .e2e-progress.json: lc_bypass_applied = true');
          "

      - name: 驗證 LC Bypass 結果
        run: |
          echo "=== plugin.php LC bypass 驗證 ==="
          if grep -q "'lc'" plugin.php; then
            echo "✅ plugin.php 已成功注入 'lc' => false"
            grep -n "lc" plugin.php | head -5
          else
            echo "❌ plugin.php 未找到 'lc' bypass，請檢查 capability line 是否存在"
            exit 1
          fi

          echo ""
          echo "=== .e2e-progress.json 驗證 ==="
          LCB=$(node -e "const p=JSON.parse(require('fs').readFileSync('.e2e-progress.json','utf-8')); console.log(p.lc_bypass_applied)")
          if [ "$LCB" = "true" ]; then
            echo "✅ .e2e-progress.json lc_bypass_applied = true"
          else
            echo "❌ .e2e-progress.json lc_bypass_applied 未更新（值：$LCB）"
            exit 1
          fi

      - name: 建置前端（驗證第二個 job 也能 build）
        run: pnpm run build

      # ── 新步驟：auth-state artifact 預檢 ─────────────
      # act 環境下 gh api 無法查詢 artifact，改用 mock（直接設 exists=true）
      - name: 模擬 auth-state artifact 預檢（act 替代）
        id: check_auth
        run: |
          # 在真實 CI 中這裡會用 gh api 查詢；act 環境直接 mock 為 true
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "ℹ️ [Mock] auth-state artifact 存在: 是"

      - name: 下載 auth-state artifact
        if: steps.check_auth.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/.auth/
        continue-on-error: true

      - name: 驗證 artifact 傳遞成功
        run: |
          if [ -f tests/e2e/.auth/admin.json ]; then
            echo "✅ auth-state artifact 跨 job 傳遞成功"
            echo "內容："
            cat tests/e2e/.auth/admin.json
          else
            # act on Windows 有 artifact server bug，此步驟僅作警告
            echo "⚠️  auth-state artifact 下載失敗（act on Windows 已知限制，不計失敗）"
            echo "    → 真實 CI 環境下 artifact 傳遞正常"
            echo "    → 重點：下載步驟有條件執行（check_auth.outputs.exists == true），且不再噴 Error 紅字"
          fi

      - name: 確認 ai-acceptance job 完成
        run: |
          echo "✅ ai-acceptance job 完成"
          echo "  - needs.integration-tests.outputs.phpunit_ok: ${{ needs.integration-tests.outputs.phpunit_ok }}"
          echo "  - LC bypass: ✅"
          echo "  - .e2e-progress.json updated: ✅"
          echo "  - 前端 build（第二個 job）: ✅"
          echo "  - auth artifact 跨 job 下載: ✅（or known act limitation）"
          echo "  - 多 job 結構驗證完成"
