name: 'Claude Code with Retry'
description: 'Run claude-code-action with up to 3 retries (30s / 60s backoff)'

inputs:
  prompt:
    description: 'Prompt to send to Claude'
    required: true
  max_turns:
    description: 'Max conversation turns'
    default: '120'
  agent:
    description: 'Agent name (e.g. zenbu-powers:clarifier)'
    required: false
    default: ''
  model:
    description: 'Claude model to use'
    default: 'opus'
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true
  settings:
    description: 'Path to settings.json'
    default: '.claude/settings.json'
  plugins:
    description: 'Plugin list'
    default: 'zenbu-powers@zenbu-powers'
  plugin_marketplaces:
    description: 'Plugin marketplace URLs'
    default: 'https://github.com/zenbuapps/zenbu-powers.git'

outputs:
  success:
    description: 'Whether any attempt succeeded'
    value: ${{ steps.result.outputs.success }}

runs:
  using: 'composite'
  steps:
    # ── Attempt 1/3 ──
    - name: "Attempt 1/3"
      id: attempt_1
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      env:
        CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        MAX_CONSECUTIVE_AUTOCOMPACT_FAILURES: "3"
        ZENBU_HOOKS_ENABLED: "1"
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        additional_permissions: |
          actions: read
        settings: ${{ inputs.settings }}
        plugin_marketplaces: ${{ inputs.plugin_marketplaces }}
        plugins: ${{ inputs.plugins }}
        prompt: ${{ inputs.prompt }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.max_turns }}
          --model ${{ inputs.model }}
          ${{ inputs.agent != '' && format('--agent {0}', inputs.agent) || '' }}

    # ── Attempt 1 failed → backoff 30s ──
    - name: "Backoff 30s (attempt 1 failed)"
      if: steps.attempt_1.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::Attempt 1 failed, retrying in 30s..."
        sleep 30

    # ── Attempt 2/3 ──
    - name: "Attempt 2/3"
      id: attempt_2
      if: steps.attempt_1.outcome == 'failure'
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      env:
        CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        MAX_CONSECUTIVE_AUTOCOMPACT_FAILURES: "3"
        ZENBU_HOOKS_ENABLED: "1"
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        additional_permissions: |
          actions: read
        settings: ${{ inputs.settings }}
        plugin_marketplaces: ${{ inputs.plugin_marketplaces }}
        plugins: ${{ inputs.plugins }}
        prompt: ${{ inputs.prompt }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.max_turns }}
          --model ${{ inputs.model }}
          ${{ inputs.agent != '' && format('--agent {0}', inputs.agent) || '' }}

    # ── Attempt 2 failed → backoff 60s ──
    - name: "Backoff 60s (attempt 2 failed)"
      if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::Attempt 2 failed, retrying in 60s..."
        sleep 60

    # ── Attempt 3/3 (final) ──
    - name: "Attempt 3/3 (final)"
      id: attempt_3
      if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      env:
        CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        MAX_CONSECUTIVE_AUTOCOMPACT_FAILURES: "3"
        ZENBU_HOOKS_ENABLED: "1"
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        additional_permissions: |
          actions: read
        settings: ${{ inputs.settings }}
        plugin_marketplaces: ${{ inputs.plugin_marketplaces }}
        plugins: ${{ inputs.plugins }}
        prompt: ${{ inputs.prompt }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.max_turns }}
          --model ${{ inputs.model }}
          ${{ inputs.agent != '' && format('--agent {0}', inputs.agent) || '' }}

    # ── Evaluate result ──
    - name: Evaluate result
      id: result
      shell: bash
      run: |
        if [ "${{ steps.attempt_1.outcome }}" = "success" ] || \
           [ "${{ steps.attempt_2.outcome }}" = "success" ] || \
           [ "${{ steps.attempt_3.outcome }}" = "success" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::Claude succeeded"
        else
          echo "success=false" >> $GITHUB_OUTPUT
          echo "::error::All 3 attempts failed"
        fi
