# 本地 act 測試用 — 驗證多 job 結構（job 依賴鏈 + artifact 傳遞 + build）
# Windows 用法（需先建立 artifact 目錄）:
#   mkdir -p "$env:TEMP/act-artifacts"
#   act workflow_dispatch -W .github/workflows/act-test.yml \
#     --container-architecture linux/amd64 \
#     -P ubuntu-latest=catthehacker/ubuntu:act-latest \
#     --container-options "--privileged" \
#     --artifact-server-path "C:/Users/$env:USERNAME/AppData/Local/Temp/act-artifacts"
#
# ⚠️ 此檔案僅供本機 act 測試用（workflow_dispatch 觸發），不會自動執行
# NOTE: act on Windows 的 artifact server v4 有 bug，artifact 下載會失敗但不影響結構驗證
#
# 測試範圍（刻意 mock 掉 wp-env 和 Claude Code，只驗結構）：
#   integration-tests job：安裝依賴 + build + 上傳 auth artifact
#   ai-acceptance job：auth artifact 預檢 + 下載 + 驗證
#
# Power Shop 特性：
#   - 無 PHPUnit（mock 掉），改 Mock E2E 結果
#   - 無 'capability' 行（移除 LC bypass step）

name: Act Test (Multi-Job Structure Validation)

on:
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WP_CLI_ALLOW_ROOT: 1
    outputs:
      e2e_ok: ${{ steps.mock_e2e.outcome }}
    steps:
      # LOCAL-ONLY：此 workflow 僅供本機 act 使用，拒絕在真實 GitHub runner 執行
      - name: 確認 LOCAL-ONLY（僅 act 環境可執行）
        env:
          ACT: ${{ env.ACT }}
        run: |
          if [ "${ACT:-false}" != "true" ]; then
            echo "::error::act-test.yml 僅供本機 act 執行，禁止在 GitHub runner 上跑"
            exit 1
          fi
          echo "✅ 偵測到 act 環境，繼續執行"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安裝 Node 依賴
        run: pnpm install

      - name: 安裝 PHP + Composer（act image 未預裝）
        run: |
          apt-get update -qq && apt-get install -y -qq php-cli php-xml php-mbstring php-curl unzip > /dev/null 2>&1
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: 安裝 Composer 依賴
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      - name: 建置前端（驗證 TypeScript 編譯正常）
        run: pnpm run build

      - name: Mock Playwright E2E 結果（act 環境跳過 wp-env）
        id: mock_e2e
        run: |
          echo "✅ [Mock] Playwright E2E 已略過（act 環境不啟動 wp-env）"
          echo "status=passed" >> $GITHUB_OUTPUT

      - name: 建立模擬 auth state（供 ai-acceptance job 使用）
        run: |
          mkdir -p tests/e2e/.auth
          echo '{"cookies":[{"name":"wordpress_logged_in","value":"mock_token","domain":"localhost"}],"origins":[]}' > tests/e2e/.auth/admin.json
          echo "✅ 模擬 auth state 建立完成"
          cat tests/e2e/.auth/admin.json

      - name: 上傳 auth-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/.auth/
          retention-days: 1

      - name: 確認 integration-tests job 完成
        run: |
          echo "✅ integration-tests job 完成"
          echo "  - 前端 build: ✅"
          echo "  - auth artifact 已上傳: ✅"
          echo "  - outputs.e2e_ok: ${{ steps.mock_e2e.outcome }}"

  ai-acceptance:
    name: AI 驗收
    needs: integration-tests
    if: needs.integration-tests.outputs.e2e_ok == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安裝 Node 依賴
        run: pnpm install

      - name: 安裝 PHP + Composer（act image 未預裝）
        run: |
          apt-get update -qq && apt-get install -y -qq php-cli php-xml php-mbstring php-curl unzip > /dev/null 2>&1
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer --version

      - name: 安裝 Composer 依賴（主機端）
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      # ── Power Shop plugin.php 無 'capability' 行 → 跳過 LC bypass，僅標記 .e2e-progress.json ──
      - name: 標記 .e2e-progress.json
        run: |
          if [ -f .e2e-progress.json ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('.e2e-progress.json','utf-8'));
              p.last_updated = new Date().toISOString();
              fs.writeFileSync('.e2e-progress.json', JSON.stringify(p, null, '\t'));
              console.log('✅ .e2e-progress.json updated');
            "
          else
            echo "ℹ️ .e2e-progress.json 不存在，略過"
          fi

      - name: 建置前端（驗證第二個 job 也能 build）
        run: pnpm run build

      # ── auth-state artifact 預檢 ─────────────
      # act 環境下 gh api 無法查詢 artifact，改用 mock（直接設 exists=true）
      - name: 模擬 auth-state artifact 預檢（act 替代）
        id: check_auth
        run: |
          # 在真實 CI 中這裡會用 gh api 查詢；act 環境直接 mock 為 true
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "ℹ️ [Mock] auth-state artifact 存在: 是"

      - name: 下載 auth-state artifact
        if: steps.check_auth.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/.auth/
        continue-on-error: true

      - name: 驗證 artifact 傳遞成功
        run: |
          if [ -f tests/e2e/.auth/admin.json ]; then
            echo "✅ auth-state artifact 跨 job 傳遞成功"
            echo "內容："
            cat tests/e2e/.auth/admin.json
          else
            # act on Windows 有 artifact server bug，此步驟僅作警告
            echo "⚠️  auth-state artifact 下載失敗（act on Windows 已知限制，不計失敗）"
            echo "    → 真實 CI 環境下 artifact 傳遞正常"
          fi

      - name: 確認 ai-acceptance job 完成
        run: |
          echo "✅ ai-acceptance job 完成"
          echo "  - needs.integration-tests.outputs.e2e_ok: ${{ needs.integration-tests.outputs.e2e_ok }}"
          echo "  - 前端 build（第二個 job）: ✅"
          echo "  - auth artifact 跨 job 下載: ✅（or known act limitation）"
          echo "  - 多 job 結構驗證完成"
