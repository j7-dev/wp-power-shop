      operationId: listProducts
      security:
        - WPNonce: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - publish
              - draft
              - trash
              - any
        - name: type
          in: query
          schema:
            type: string
            enum:
              - simple
              - variable
              - grouped
              - external
              - subscription
              - variable-subscription
        - name: category
          in: query
          description: 分類 slug 或 ID
          schema:
            type: string
        - name: tag
          in: query
          description: 標籤 slug 或 ID
          schema:
            type: string
