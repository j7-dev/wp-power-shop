  # ────────────────────────────
  # Analytics
  # ────────────────────────────

  /power-shop/reports/revenue:
    get:
      tags:
        - Analytics
      summary: 查詢營收分析
      operationId: getRevenueReport
      security:
        - WPNonce: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum:
              - today
              - yesterday
              - week
              - month
              - year
              - custom
            default: month
        - name: interval
          in: query
          description: 資料分組粒度
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
        - name: date_start
          in: query
          schema:
            type: string
            format: date
        - name: date_end
          in: query
          schema:
            type: string
            format: date
        - name: order_status
          in: query
          description: 篩選特定訂單狀態（逗號分隔多值）
          schema:
            type: array
            items:
              type: string
              enum:
                - pending
                - processing
                - on-hold
                - completed
                - cancelled
                - refunded
                - failed
          style: form
          explode: false
      responses:
        '200':
          description: 營收分析報表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueReport'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
