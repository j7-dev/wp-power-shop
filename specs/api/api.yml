  /wc/v3/products/{id}/variations/batch:
    post:
      tags:
        - Products
      summary: 自動生成/批量管理商品變體
      operationId: batchProductVariations
      description: >-
        透過笛卡爾積自動生成所有屬性組合的變體，或批量更新 / 刪除現有變體。
        對應前端 ProductEdit 的「自動生成所有變體」功能。
      security:
        - WPNonce: []
      parameters:
        - name: id
          in: path
          required: true
          description: 父商品 ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchVariationsRequest'
      responses:
        '200':
          description: 批量變體操作結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  create:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
                  update:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
                  delete:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariation'
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

