  # ────────────────────────────
  # Products
  # ────────────────────────────

  /wc/v3/products/categories:
    get:
      tags:
        - Products
      summary: 查詢商品分類列表
      operationId: listProductCategories
      security:
        - WPNonce: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
        - name: parent
          in: query
          description: 篩選指定父分類的子分類（0 = 頂層）
          schema:
            type: integer
        - name: hide_empty
          in: query
          description: 隱藏無商品的分類
          schema:
            type: boolean
            default: false
        - name: orderby
          in: query
          schema:
            type: string
            enum:
              - id
              - include
              - name
              - slug
              - term_group
              - description
              - count
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: 商品分類列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCategory'
        '403':
          description: 無權限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Products
      summary: 新增商品分類
      operationId: createProductCategory
      security:
        - WPNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
